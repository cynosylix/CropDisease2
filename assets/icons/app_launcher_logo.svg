<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Rounded square: 50% of 1024 = 512, radius 25% of 512 = 128, centered -->
  <rect x="256" y="256" width="512" height="512" rx="128" ry="128" fill="#DDE7DA"/>
  <!-- Eco leaf: two lobes + stem (minimal flat), centered, ~50% of square -->
  <g transform="translate(512 512)">
    <ellipse cx="-90" cy="-70" rx="120" ry="120" fill="#2E7D32"/>
    <ellipse cx="90" cy="-70" rx="120" ry="120" fill="#2E7D32"/>
    <rect x="-45" y="120" width="90" height="180" rx="45" fill="#2E7D32"/>
    <ellipse cx="0" cy="300" rx="45" ry="45" fill="#2E7D32"/>
  </g>
</svg>
